{% extends 'base.html' %}
{% block title %}Login - MockMaster{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card" style="padding: 2.5rem; text-align: center;">
        <div style="background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 1.5rem;">
            <i class="fa-solid fa-lock"></i>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p class="text-muted" style="margin-bottom: 2rem;">Please sign in to access restricted modules.</p>

        <form action="{{ url_for('login', next=request.args.get('next')) }}" method="POST">
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="username">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" style="padding-left: 2.5rem;" required autofocus>
                </div>
            </div>

            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-key" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" style="padding-left: 2.5rem;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                Sign In <i class="fa-solid fa-right-to-bracket" style="margin-left: 8px;"></i>
            </button>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #E5E7EB;">
            <p style="font-size: 0.875rem; color: var(--text-muted); margin: 0;">
                <i class="fa-solid fa-circle-info" style="margin-right: 4px;"></i> 
                Authorized personnel only.
            </p>
        </div>
    </div>
</div>
{% endblock %}
