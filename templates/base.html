<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mock Test App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load FontAwesome for icons if needed -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="nav-brand">
            <i class="fa-solid fa-layer-group"></i> MockMaster
        </a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-item">Home</a>
            <a href="{{ url_for('practice') }}" class="nav-item">Practice</a>
            <a href="{{ url_for('history') }}" class="nav-item">History</a>
            <a href="{{ url_for('upload') }}" class="nav-item">Backend (Upload)</a>
            <a href="https://github.com/" target="_blank" class="nav-item" title="Visit our GitHub"><i class="fa-brands fa-github" style="margin-right: 4px;"></i>GitHub</a>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
